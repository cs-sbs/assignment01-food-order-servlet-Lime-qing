<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>外卖平台 - 首页</title>
</head>
<body>
<h1>欢迎来外卖平台</h1>

<h2>菜单</h2>
<ul>
    <li><a href="/menu">查看所有菜单</a></li>
    <li><a href="/menu?name=Fried">搜索 Fried</a></li>
</ul>

<h2>新增订单</h2>

<form action="/order" method="post">
    用户: <input name="customer"><br>
    食物: <input name="food"><br>
    数量: <input name="quantity"><br>
    <input type="submit" value="Place Order">
</form>

<h2>查看订单</h2>
<p>访问 <a href="/order/1001">Order #1001</a> 查看订单详情</p>

</body>
</html>
